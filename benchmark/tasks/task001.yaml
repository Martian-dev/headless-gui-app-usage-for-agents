id: writer_doc_001

instruction: |
  Build a polished LibreOffice Writer quarterly business review document from
  the provided inputs. The document must include a title, executive summary,
  KPI scorecard table, regional performance table, initiative roadmap table,
  risk register table, and an embedded chart showing monthly revenue and gross
  margin trend values. Save the finished document as output.odt.

setup:
  - starter.odt

expected:
  output_file: output.odt
  title: Q3 Revenue Operations Review
  required_text:
    - "## Executive Summary"
    - "Q3 revenue operations closed above plan, with expansion revenue offsetting slower new logo conversion in the enterprise segment."
    - "## KPI Scorecard"
    - "Net Revenue Retention"
    - "Pipeline Coverage"
    - "Forecast Accuracy"
    - "Gross Margin"
    - "## Regional Performance"
    - "North America"
    - "EMEA"
    - "APAC"
    - "## Monthly Revenue And Margin Trend"
    - "July"
    - "August"
    - "September"
    - "Revenue"
    - "Gross Margin"
    - "## Strategic Initiatives"
    - "Renewal desk automation"
    - "Partner-sourced pipeline"
    - "Billing exception cleanup"
    - "## Risk Register"
    - "Enterprise sales cycle slippage"
    - "Data quality backlog"
    - "Partner enablement capacity"
    - "## Decisions Requested"
    - "Approve two incremental data operations contractors for Q4."
  required_tables:
    - "KPI Scorecard"
    - "Regional Performance"
    - "Strategic Initiatives"
    - "Risk Register"
  min_tables: 4
  required_chart_images:
    - "Pictures/monthly_revenue_margin_chart.svg"
  required_chart_labels:
    - "Monthly Revenue And Margin Trend"
    - "July"
    - "August"
    - "September"
    - "Revenue"
    - "Gross Margin"
  min_chart_images: 1
